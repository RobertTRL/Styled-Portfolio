    <script>
      (function () {
        try {
          let saved = localStorage.getItem('isDark');
          let isDark = saved !== null
            ? JSON.parse(saved)
            : window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (!isDark) document.documentElement.classList.add('light-flash');
        } catch (e) {}
      })();
    </script>
